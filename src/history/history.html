<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Balance — Watch history</title>
  <link rel="stylesheet" href="history.css" />
</head>
<body>
  <div class="wrap">
    <h1><span class="logo">⚖</span> Watch history</h1>
    <p class="muted">Your YouTube time by lane, per day. Kept for the last ~8 weeks.</p>

    <div class="summary" id="summary"></div>

    <section>
      <div class="legend">
        <span><i class="d enrich"></i> Enrich</span>
        <span><i class="d recharge"></i> Recharge</span>
        <span><i class="d drift"></i> Drift</span>
        <span><i class="d unset"></i> Unsorted</span>
      </div>
      <div id="days" class="days"></div>
      <p id="empty" class="muted" hidden>No history yet — watch some YouTube and check back.</p>
    </section>
  </div>
  <script type="module" src="history.js"></script>
</body>
</html>
