<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="head">
    <span class="logo">⚖</span>
    <span class="ttl">Balance</span>
    <label class="switch" title="Enable / disable Balance">
      <input type="checkbox" id="enabled" />
      <span class="track"></span>
    </label>
  </div>

  <div id="now" class="now muted">Open a YouTube video to see its lane.</div>

  <div class="card">
    <div class="row"><span class="muted">Recharge budget</span><span id="budgetVal"></span></div>
    <div class="bar"><div id="barFill"></div></div>
    <div id="credits" class="muted small"></div>
  </div>

  <div class="lanes" id="lanes"></div>

  <div class="actions">
    <button id="pause">Pause 15 min</button>
    <button id="end">End session</button>
    <button id="history">History</button>
    <button id="opts">Settings</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
